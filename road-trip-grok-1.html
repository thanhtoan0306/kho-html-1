<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road Trip Bắc → Nam</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#080c0e;font-family:'Barlow Condensed',sans-serif;overflow:hidden;height:100vh;width:100vw}
#map{width:100%;height:100%}
.leaflet-tile{filter:brightness(0.36) saturate(0.18) hue-rotate(170deg) invert(1) sepia(0.25)}
.leaflet-control-zoom a{background:rgba(8,12,14,0.92)!important;color:#f0a500!important;border-color:rgba(240,165,0,0.3)!important}
.leaflet-control-zoom a:hover{background:rgba(240,165,0,0.12)!important}
.leaflet-control-attribution{display:none}
#hdr{position:fixed;top:0;left:0;right:0;z-index:1000;padding:14px 24px 12px;background:linear-gradient(to bottom,rgba(8,12,14,0.98) 65%,transparent);pointer-events:none;display:flex;flex-direction:column;align-items:center;}
#hdr h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.5rem,4.5vw,2.6rem);letter-spacing:0.3em;color:#fff;text-shadow:0 0 28px rgba(240,165,0,0.9),0 0 70px rgba(240,165,0,0.35);}
#hdr .sub{font-size:0.66rem;color:rgba(240,200,100,0.5);letter-spacing:0.28em;text-transform:uppercase;margin-top:2px}
#checkin-panel{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:1000;display:flex;flex-direction:column;gap:0;max-height:78vh;overflow-y:auto;overflow-x:hidden;scrollbar-width:none;}
#checkin-panel::-webkit-scrollbar{display:none}
.ci-item{display:flex;align-items:center;gap:10px;padding:5px 0 5px 10px;border-left:2px solid rgba(240,165,0,0.15);opacity:0.35;cursor:pointer;transition:all 0.3s;min-width:160px;}
.ci-item:hover{opacity:0.8}
.ci-item.visited{opacity:0.7;border-left-color:rgba(240,165,0,0.45)}
.ci-item.active{opacity:1;border-left-color:#f0a500}
.ci-item.active .ci-num{background:#f0a500;color:#000;box-shadow:0 0 10px #f0a500}
.ci-num{width:20px;height:20px;border-radius:50%;background:rgba(240,165,0,0.2);border:1px solid rgba(240,165,0,0.4);font-family:'Bebas Neue',sans-serif;font-size:0.65rem;color:#f0a500;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.3s;}
.ci-item.visited .ci-num{background:rgba(240,165,0,0.3);color:#f0a500}
.ci-name{font-size:0.72rem;font-weight:600;color:rgba(255,230,150,0.85);letter-spacing:0.08em;white-space:nowrap}
.ci-item.active .ci-name{color:#fff}
.ci-tick{font-size:0.6rem;color:#f0a500;margin-left:2px;opacity:0}
.ci-item.visited .ci-tick{opacity:1}
.dot-lbl{background:transparent!important;border:none!important;box-shadow:none!important}
.dot-lbl div{font-family:'Barlow Condensed',sans-serif;font-size:0.62rem;font-weight:700;letter-spacing:0.1em;color:rgba(255,230,140,0.9);text-shadow:0 0 8px rgba(240,165,0,0.8);white-space:nowrap;text-transform:uppercase;}
.car-icon{background:transparent!important;border:none!important;box-shadow:none!important}
#stats{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;gap:28px;background:rgba(8,12,14,0.88);border:1px solid rgba(240,165,0,0.2);border-radius:40px;padding:8px 28px;backdrop-filter:blur(10px);pointer-events:none;}
.stat{text-align:center}
.stat .sv{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#f0a500;letter-spacing:0.1em;text-shadow:0 0 10px rgba(240,165,0,0.6)}
.stat .sk{font-size:0.55rem;color:rgba(240,200,100,0.45);letter-spacing:0.15em;text-transform:uppercase;margin-top:-2px}
#prog-bar{position:fixed;bottom:0;left:0;right:0;height:3px;background:rgba(240,165,0,0.1);z-index:1001}
#prog-fill{height:100%;background:linear-gradient(90deg,#f0a500,#ffe080);transition:width 0.8s ease;box-shadow:0 0 8px rgba(240,165,0,0.7)}
#nav{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:1001}
.nb{background:rgba(8,12,14,0.9);border:1px solid rgba(240,165,0,0.4);color:#f0a500;font-family:'Bebas Neue',sans-serif;font-size:0.88rem;letter-spacing:0.15em;padding:7px 20px;border-radius:30px;cursor:pointer;transition:all 0.22s;backdrop-filter:blur(8px);}
.nb:hover{background:rgba(240,165,0,0.14);border-color:#f0a500;box-shadow:0 0 14px rgba(240,165,0,0.3)}
.nb:disabled{opacity:0.18;cursor:not-allowed}
.nb.play{padding:7px 26px}
#step-ctr{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:1001;font-family:'Bebas Neue',sans-serif;font-size:0.7rem;letter-spacing:0.2em;color:rgba(240,165,0,0.4)}
#autoplay-dot{width:7px;height:7px;border-radius:50%;background:#f0a500;animation:none;display:inline-block;margin-right:5px;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.1}}
</style>
</head>
<body>
<div id="hdr">
  <h1>🚗 ROAD TRIP BẮC → NAM</h1>
  <div class="sub"><span id="autoplay-dot"></span>Check-in 20 tỉnh · Hành trình xuyên Việt</div>
</div>
<div id="map"></div>
<div id="checkin-panel"></div>
<div id="stats">
  <div class="stat"><div class="sv" id="sv-checked">0</div><div class="sk">Tỉnh đã qua</div></div>
  <div class="stat"><div class="sv" id="sv-km">0</div><div class="sk">Km ước tính</div></div>
  <div class="stat"><div class="sv" id="sv-pct">0%</div><div class="sk">Hành trình</div></div>
</div>
<div id="prog-bar"><div id="prog-fill" style="width:0%"></div></div>
<div id="nav">
  <button class="nb" id="btn-prev">◀ PREV</button>
  <button class="nb play" id="btn-play">▶ PLAY</button>
  <button class="nb" id="btn-next">NEXT ▶</button>
</div>
<div id="step-ctr"></div>

<script>
// Data
const STOPS = [
  [21.0285, 105.8542, 'Hà Nội', 0],
  [20.9144, 106.0523, 'Hà Nam', 60],
  [20.5388, 106.2036, 'Nam Định', 110],
  [20.4108, 106.1646, 'Ninh Bình', 130],
  [20.0505, 105.7746, 'Thanh Hóa', 175],
  [18.8068, 105.6818, 'Nghệ An', 320],
  [18.3557, 105.8877, 'Hà Tĩnh', 380],
  [17.4698, 106.5884, 'Quảng Bình', 500],
  [16.8163, 107.0903, 'Quảng Trị', 570],
  [16.4674, 107.5905, 'Thừa Thiên Huế', 640],
  [16.0544, 108.2022, 'Đà Nẵng', 720],
  [15.8801, 108.3380, 'Quảng Nam', 760],
  [15.1214, 108.8092, 'Quảng Ngãi', 860],
  [14.1665, 108.9337, 'Bình Định', 970],
  [13.0832, 109.2979, 'Phú Yên', 1080],
  [12.2388, 109.1967, 'Khánh Hòa', 1190],
  [11.5645, 108.9880, 'Ninh Thuận', 1280],
  [11.0906, 108.0721, 'Bình Thuận', 1340],
  [10.9804, 106.6519, 'Đồng Nai', 1510],
  [10.7769, 106.7009, 'TP.HCM', 1710],
];
const TOTAL_KM = 1710;
const ROUTE_LATLNGS = STOPS.map(s => [s[0], s[1]]);

// Map
const map = L.map('map', {center: [16, 107], zoom: 6, zoomControl: true, attributionControl: false});
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {maxZoom: 18}).addTo(map);

// Vietnam outline (ghost)
const vnCoords = [[23.3,102.1],[23.4,103.9],[22.8,104.7],[22.5,104.0],[21.5,104.4],[20.9,104.1],[20.4,103.7],[20.1,103.9],[19.5,104.0],[18.6,105.6],[17.6,106.5],[16.9,107.2],[16.0,108.0],[15.1,108.4],[14.2,109.2],[13.4,109.3],[12.2,109.2],[11.4,108.9],[10.9,108.2],[10.5,107.4],[10.3,106.4],[10.7,105.0],[10.3,104.5],[9.9,104.9],[10.4,103.5],[10.8,104.4],[11.5,104.6],[12.0,103.5],[13.0,103.5],[13.5,103.8],[14.5,103.7],[15.0,103.0],[15.5,102.6],[16.5,102.0],[17.0,102.5],[17.5,103.4],[18.0,104.0],[19.0,103.0],[19.5,102.1],[20.0,102.2],[20.9,102.2],[21.5,101.6],[22.1,102.2],[22.7,102.8],[23.3,102.1]];
L.polygon(vnCoords, {color:'#f0a500', weight:1, opacity:0.3, fillColor:'#f0a500', fillOpacity:0.03}).addTo(map);

// Ghost route
L.polyline(ROUTE_LATLNGS, {color: 'rgba(240,165,0,0.12)', weight: 3, dashArray: '6 8'}).addTo(map);

// SVG overlay
const NS = 'http://www.w3.org/2000/svg';
const svg = document.createElementNS(NS, 'svg');
svg.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:500;overflow:visible;';
document.body.appendChild(svg);

const defs = document.createElementNS(NS, 'defs');
defs.innerHTML = `
  <filter id="glow-road" x="-80%" y="-80%" width="260%" height="260%"><feGaussianBlur stdDeviation="5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <filter id="glow-dot" x="-100%" y="-100%" width="300%" height="300%"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
`;
svg.appendChild(defs);

const traceLine = document.createElementNS(NS, 'polyline');
traceLine.setAttribute('fill', 'none');
traceLine.setAttribute('stroke', '#f0a500');
traceLine.setAttribute('stroke-width', '2.8');
traceLine.setAttribute('stroke-dasharray', '10 6');
traceLine.setAttribute('stroke-linecap', 'round');
traceLine.setAttribute('filter', 'url(#glow-road)');
traceLine.setAttribute('opacity', '0.9');
svg.appendChild(traceLine);

const traceGlow = document.createElementNS(NS, 'polyline');
traceGlow.setAttribute('fill', 'none');
traceGlow.setAttribute('stroke', '#f0a500');
traceGlow.setAttribute('stroke-width', '10');
traceGlow.setAttribute('stroke-linecap', 'round');
traceGlow.setAttribute('opacity', '0.12');
svg.insertBefore(traceGlow, traceLine);

// Car
const carIcon = L.divIcon({className: 'car-icon', html: `<div style="font-size:1.8rem;filter:drop-shadow(0 0 8px #f0a500) drop-shadow(0 0 3px #000)">🚗</div>`, iconSize: [36,36], iconAnchor: [18,24]});
const car = L.marker(ROUTE_LATLNGS[0], {icon: carIcon, zIndexOffset: 900}).addTo(map);

// State
let progress = 0;
let targetProgress = 0;
let isPlaying = false;
let lastTs = 0;

const duration = 48;           // seconds for full trip
const progressLerp = 12;
const cameraLerp = 0.18;
const zoomLerp = 0.08;

let curCenter = map.getCenter();
let tgtCenter = curCenter;
let curZoom = 6.5;
let tgtZoom = 7;

// Helpers
function posAt(p) {
  if (p <= 0) return ROUTE_LATLNGS[0];
  if (p >= 1) return ROUTE_LATLNGS.at(-1);
  const n = ROUTE_LATLNGS.length - 1;
  const i = Math.floor(p * n);
  const f = p * n - i;
  const a = ROUTE_LATLNGS[i];
  const b = ROUTE_LATLNGS[i + 1] || a;
  return [a[0] + (b[0] - a[0]) * f, a[1] + (b[1] - a[1]) * f];
}

function updateCarTrace(p) {
  const ll = posAt(p);
  car.setLatLng(ll);
  tgtCenter = L.latLng(ll);

  // Dynamic zoom: closer in middle
  tgtZoom = 6 + p * 5;
  tgtZoom = Math.max(6, Math.min(10.5, tgtZoom));

  // Trace points
  const pts = [];
  for (let i = 0; i < ROUTE_LATLNGS.length; i++) {
    if (i / (ROUTE_LATLNGS.length - 1) <= p) pts.push(ROUTE_LATLNGS[i]);
  }
  pts.push(ll);

  const str = pts.map(c => {
    const px = map.latLngToContainerPoint(c);
    return `${px.x},${px.y}`;
  }).join(' ');

  traceLine.setAttribute('points', str || '0,0');
  traceGlow.setAttribute('points', str || '0,0');
}

// Animation
function loop(ts) {
  if (!lastTs) lastTs = ts;
  const dt = (ts - lastTs) / 1000;
  lastTs = ts;

  if (isPlaying) targetProgress = Math.min(1, targetProgress + dt / duration);

  progress += (targetProgress - progress) * Math.min(1, dt * progressLerp);
  updateCarTrace(progress);

  // Camera follow
  curCenter.lat += (tgtCenter.lat - curCenter.lat) * cameraLerp;
  curCenter.lng += (tgtCenter.lng - curCenter.lng) * cameraLerp;
  curZoom += (tgtZoom - curZoom) * zoomLerp;

  map.setView(curCenter, curZoom, {animate: false});

  // Stats & panel (throttle updates)
  const nearest = Math.min(STOPS.length - 1, Math.round(progress * (STOPS.length - 1)));
  document.getElementById('sv-checked').textContent = nearest + 1;
  document.getElementById('sv-km').textContent = Math.round(progress * TOTAL_KM).toLocaleString();
  document.getElementById('sv-pct').textContent = Math.round(progress * 100) + '%';
  document.getElementById('prog-fill').style.width = (progress * 100) + '%';
  document.getElementById('step-ctr').textContent = `${nearest + 1} / ${STOPS.length}`;

  // Panel highlight
  document.querySelectorAll('.ci-item').forEach((el,i) => {
    el.classList.toggle('visited', i <= nearest);
    el.classList.toggle('active', i === nearest);
  });
  document.querySelector('.ci-item.active')?.scrollIntoView({behavior: 'smooth', block: 'nearest'});

  if (progress >= 0.999 && isPlaying) {
    isPlaying = false;
    document.getElementById('autoplay-dot').style.animation = 'none';
    document.getElementById('autoplay-dot').style.opacity = '0.2';
    document.getElementById('btn-play').textContent = '▶ PLAY';
  }

  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// Controls
function jumpTo(idx) {
  if (idx < 0 || idx >= STOPS.length) return;
  targetProgress = idx / (STOPS.length - 1);
  const loc = STOPS[idx];
  map.flyTo(loc[0], loc[1], {zoom: idx === 0 || idx === STOPS.length-1 ? 9 : 8, duration: 1.3});
  setTimeout(() => {
    tgtCenter = L.latLng(loc[0], loc[1]);
    curCenter = tgtCenter;
  }, 1400);
}

function play() {
  if (progress >= 0.999) { progress = targetProgress = 0; updateCarTrace(0); }
  isPlaying = true;
  document.getElementById('autoplay-dot').style.animation = 'blink 1s ease-in-out infinite';
  document.getElementById('autoplay-dot').style.opacity = '1';
  document.getElementById('btn-play').textContent = '⏸ PAUSE';
}

function pause() {
  isPlaying = false;
  document.getElementById('autoplay-dot').style.animation = 'none';
  document.getElementById('autoplay-dot').style.opacity = '0.2';
  document.getElementById('btn-play').textContent = '▶ PLAY';
}

document.getElementById('btn-play').onclick = () => isPlaying ? pause() : play();
document.getElementById('btn-next').onclick = () => { pause(); let i = Math.round(targetProgress * (STOPS.length-1)); jumpTo(Math.min(STOPS.length-1, i+1)); };
document.getElementById('btn-prev').onclick = () => { pause(); let i = Math.round(targetProgress * (STOPS.length-1)); jumpTo(Math.max(0, i-1)); };

// Panel
const panel = document.getElementById('checkin-panel');
STOPS.forEach((s,i) => {
  const div = document.createElement('div');
  div.className = 'ci-item';
  div.id = `ci-${i}`;
  div.innerHTML = `<div class="ci-num">${i+1}</div><div class="ci-name">${s[2]}</div><div class="ci-tick">✓</div>`;
  div.onclick = () => { pause(); jumpTo(i); };
  panel.appendChild(div);
});

// Start
setTimeout(() => {
  jumpTo(0);
  pause();
}, 800);
</script>
</body>
</html>
