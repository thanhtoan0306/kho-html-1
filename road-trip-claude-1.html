<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Road Trip Bắc → Nam</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<style>
@import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@300;400;600;700&display=swap');
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:#080c0e;font-family:'Barlow Condensed',sans-serif;overflow:hidden;height:100vh;width:100vw}
#map{width:100%;height:100%}
.leaflet-tile{filter:brightness(0.36) saturate(0.18) hue-rotate(170deg) invert(1) sepia(0.25)}
.leaflet-control-zoom a{background:rgba(8,12,14,0.92)!important;color:#f0a500!important;border-color:rgba(240,165,0,0.3)!important}
.leaflet-control-zoom a:hover{background:rgba(240,165,0,0.12)!important}
.leaflet-control-attribution{display:none}

#hdr{position:fixed;top:0;left:0;right:0;z-index:1000;padding:14px 24px 12px;background:linear-gradient(to bottom,rgba(8,12,14,0.98) 65%,transparent);pointer-events:none;display:flex;flex-direction:column;align-items:center}
#hdr h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(1.4rem,4vw,2.4rem);letter-spacing:0.3em;color:#fff;text-shadow:0 0 28px rgba(240,165,0,0.9),0 0 70px rgba(240,165,0,0.35)}
#hdr .sub{font-size:0.65rem;color:rgba(240,200,100,0.5);letter-spacing:0.28em;text-transform:uppercase;margin-top:2px}

#checkin-panel{position:fixed;left:16px;top:50%;transform:translateY(-50%);z-index:1000;display:flex;flex-direction:column;gap:0;max-height:78vh;overflow-y:auto;overflow-x:hidden;scrollbar-width:none}
#checkin-panel::-webkit-scrollbar{display:none}
.ci-item{display:flex;align-items:center;gap:9px;padding:5px 0 5px 10px;border-left:2px solid rgba(240,165,0,0.15);opacity:0.35;cursor:pointer;transition:all 0.3s;min-width:155px}
.ci-item:hover{opacity:0.75}
.ci-item.visited{opacity:0.65;border-left-color:rgba(240,165,0,0.4)}
.ci-item.active{opacity:1;border-left-color:#f0a500}
.ci-item.active .ci-num{background:#f0a500;color:#000;box-shadow:0 0 10px #f0a500}
.ci-num{width:19px;height:19px;border-radius:50%;background:rgba(240,165,0,0.18);border:1px solid rgba(240,165,0,0.35);font-family:'Bebas Neue',sans-serif;font-size:0.62rem;color:#f0a500;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all 0.3s}
.ci-item.visited .ci-num{background:rgba(240,165,0,0.28)}
.ci-name{font-size:0.7rem;font-weight:600;color:rgba(255,230,150,0.82);letter-spacing:0.07em;white-space:nowrap}
.ci-item.active .ci-name{color:#fff}
.ci-tick{font-size:0.58rem;color:#f0a500;margin-left:1px;opacity:0;transition:opacity 0.3s}
.ci-item.visited .ci-tick{opacity:1}

/* dot labels on map */
.dot-lbl{background:transparent!important;border:none!important;box-shadow:none!important}
.dot-lbl div{font-family:'Barlow Condensed',sans-serif;font-size:0.6rem;font-weight:700;letter-spacing:0.09em;color:rgba(255,225,130,0.88);text-shadow:0 0 7px rgba(240,165,0,0.8);white-space:nowrap;text-transform:uppercase}

.car-icon{background:transparent!important;border:none!important;box-shadow:none!important}

#stats{position:fixed;bottom:72px;left:50%;transform:translateX(-50%);z-index:1000;display:flex;gap:26px;background:rgba(8,12,14,0.88);border:1px solid rgba(240,165,0,0.2);border-radius:40px;padding:8px 26px;backdrop-filter:blur(10px);pointer-events:none}
.stat .sv{font-family:'Bebas Neue',sans-serif;font-size:1.1rem;color:#f0a500;letter-spacing:0.1em;text-shadow:0 0 10px rgba(240,165,0,0.6)}
.stat .sk{font-size:0.52rem;color:rgba(240,200,100,0.42);letter-spacing:0.14em;text-transform:uppercase;margin-top:-2px}

#prog-bar{position:fixed;bottom:0;left:0;right:0;height:3px;background:rgba(240,165,0,0.1);z-index:1001}
#prog-fill{height:100%;background:linear-gradient(90deg,#f0a500,#ffe080);width:0%;box-shadow:0 0 8px rgba(240,165,0,0.7)}

#nav{position:fixed;bottom:18px;left:50%;transform:translateX(-50%);display:flex;gap:10px;z-index:1001}
.nb{background:rgba(8,12,14,0.9);border:1px solid rgba(240,165,0,0.4);color:#f0a500;font-family:'Bebas Neue',sans-serif;font-size:0.88rem;letter-spacing:0.15em;padding:7px 20px;border-radius:30px;cursor:pointer;transition:all 0.22s;backdrop-filter:blur(8px)}
.nb:hover{background:rgba(240,165,0,0.14);border-color:#f0a500;box-shadow:0 0 14px rgba(240,165,0,0.3)}
.nb:disabled{opacity:0.18;cursor:not-allowed}

#step-ctr{position:fixed;bottom:6px;left:50%;transform:translateX(-50%);z-index:1001;font-family:'Bebas Neue',sans-serif;font-size:0.68rem;letter-spacing:0.2em;color:rgba(240,165,0,0.38)}
#autoplay-dot{width:6px;height:6px;border-radius:50%;background:#f0a500;animation:none;display:inline-block;margin-right:5px;vertical-align:middle}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.1}}
@keyframes popDot{0%{transform:scale(0);opacity:0}60%{transform:scale(1.5)}100%{transform:scale(1);opacity:1}}
</style>
</head>
<body>
<div id="hdr">
  <h1>🚗 ROAD TRIP BẮC → NAM</h1>
  <div class="sub"><span id="autoplay-dot"></span>Check-in xuyên Việt · Hà Nội → TP.HCM</div>
</div>
<div id="map"></div>
<div id="checkin-panel"></div>
<div id="stats">
  <div class="stat"><div class="sv" id="sv-checked">0</div><div class="sk">Tỉnh đã qua</div></div>
  <div class="stat"><div class="sv" id="sv-km">0</div><div class="sk">Km</div></div>
  <div class="stat"><div class="sv" id="sv-pct">0%</div><div class="sk">Hành trình</div></div>
</div>
<div id="prog-bar"><div id="prog-fill"></div></div>
<div id="nav">
  <button class="nb" id="btn-prev">◀ PREV</button>
  <button class="nb" id="btn-play" style="padding:7px 26px">▶ PLAY</button>
  <button class="nb" id="btn-next">NEXT ▶</button>
</div>
<div id="step-ctr"></div>

<script>
// ══════════════════════════════════════════════
//  STOPS — [lat, lng, name, km]
// ══════════════════════════════════════════════
const STOPS = [
  [21.0285, 105.8542, 'Hà Nội',          0],
  [20.5388, 106.2036, 'Nam Định',       110],
  [20.4108, 106.1646, 'Ninh Bình',      130],
  [20.0505, 105.7746, 'Thanh Hóa',      175],
  [18.8068, 105.6818, 'Nghệ An',        320],
  [18.3557, 105.8877, 'Hà Tĩnh',        380],
  [17.4698, 106.5884, 'Quảng Bình',     500],
  [16.8163, 107.0903, 'Quảng Trị',      570],
  [16.4674, 107.5905, 'Huế',            640],
  [16.0544, 108.2022, 'Đà Nẵng',        720],
  [15.8801, 108.3380, 'Quảng Nam',      760],
  [15.1214, 108.8092, 'Quảng Ngãi',     860],
  [14.1665, 108.9337, 'Bình Định',      970],
  [13.0832, 109.2979, 'Phú Yên',       1080],
  [12.2388, 109.1967, 'Khánh Hòa',     1190],
  [11.5645, 108.9880, 'Ninh Thuận',    1280],
  [11.0906, 108.0721, 'Bình Thuận',    1340],
  [10.9804, 106.6519, 'Đồng Nai',      1510],
  [10.7769, 106.7009, 'TP.HCM',        1710],
];
const TOTAL_KM = 1710;

// ══════════════════════════════════════════════
//  Dense waypoints — proportional to real km
//  Each km gets the same number of micro-steps
//  so the car moves at constant speed everywhere
// ══════════════════════════════════════════════
const STEPS_PER_KM = 0.8; // micro-steps per km → ~1360 total points

function buildDensePath(stops) {
  const pts = [];
  const stopIdx = [0]; // where each stop lands in pts[]

  for (let i = 0; i < stops.length - 1; i++) {
    const a = stops[i], b = stops[i+1];
    const kmA = a[3], kmB = b[3];
    const segKm = kmB - kmA;
    // number of steps proportional to segment km
    const n = Math.max(2, Math.round(segKm * STEPS_PER_KM));
    for (let t = 0; t < n; t++) {
      const f = t / n;
      pts.push([
        a[0] + (b[0]-a[0])*f,
        a[1] + (b[1]-a[1])*f,
      ]);
    }
    stopIdx.push(pts.length); // next stop starts here
  }
  // push final point
  const last = stops[stops.length-1];
  pts.push([last[0], last[1]]);

  return { pts, stopIdx };
}

const { pts: DENSE, stopIdx: STOP_IDX } = buildDensePath(STOPS);

// ══════════════════════════════════════════════
//  MAP
// ══════════════════════════════════════════════
const map = L.map('map', { center:[18.5,106.5], zoom:6, zoomControl:true, attributionControl:false });
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom:18 }).addTo(map);

const vnCoords=[[23.3,102.1],[23.4,103.9],[22.8,104.7],[22.5,104.0],[21.5,104.4],[20.9,104.1],[20.4,103.7],[20.1,103.9],[19.5,104.0],[18.6,105.6],[17.6,106.5],[16.9,107.2],[16.0,108.0],[15.1,108.4],[14.2,109.2],[13.4,109.3],[12.2,109.2],[11.4,108.9],[10.9,108.2],[10.5,107.4],[10.3,106.4],[10.7,105.0],[10.3,104.5],[9.9,104.9],[10.4,103.5],[10.8,104.4],[11.5,104.6],[12.0,103.5],[13.0,103.5],[13.5,103.8],[14.5,103.7],[15.0,103.0],[15.5,102.6],[16.5,102.0],[17.0,102.5],[17.5,103.4],[18.0,104.0],[19.0,103.0],[19.5,102.1],[20.0,102.2],[20.9,102.2],[21.5,101.6],[22.1,102.2],[22.7,102.8],[23.3,102.1]];
L.polygon(vnCoords, {color:'#f0a500',weight:1,opacity:0.28,fillColor:'#f0a500',fillOpacity:0.03}).addTo(map);

// Ghost full route
L.polyline(STOPS.map(s=>[s[0],s[1]]), {color:'rgba(240,165,0,0.1)',weight:3,dashArray:'5 9'}).addTo(map);

// ══════════════════════════════════════════════
//  SVG OVERLAY
// ══════════════════════════════════════════════
const NS='http://www.w3.org/2000/svg';
const svgEl=document.createElementNS(NS,'svg');
svgEl.style.cssText='position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:500;overflow:visible;';
document.body.appendChild(svgEl);

const defs=document.createElementNS(NS,'defs');
defs.innerHTML=`
  <filter id="gr" x="-80%" y="-80%" width="260%" height="260%">
    <feGaussianBlur stdDeviation="5" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>
  <filter id="gd" x="-120%" y="-120%" width="340%" height="340%">
    <feGaussianBlur stdDeviation="4" result="b"/>
    <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
  </filter>`;
svgEl.appendChild(defs);

// Glow trace backing
const traceGlow=document.createElementNS(NS,'polyline');
traceGlow.setAttribute('fill','none');traceGlow.setAttribute('stroke','#f0a500');
traceGlow.setAttribute('stroke-width','11');traceGlow.setAttribute('stroke-linecap','round');
traceGlow.setAttribute('opacity','0.13');
svgEl.appendChild(traceGlow);

// Main dash trace
const traceLine=document.createElementNS(NS,'polyline');
traceLine.setAttribute('fill','none');traceLine.setAttribute('stroke','#f0a500');
traceLine.setAttribute('stroke-width','2.6');traceLine.setAttribute('stroke-linecap','round');
traceLine.setAttribute('stroke-dasharray','9 6');traceLine.setAttribute('filter','url(#gr)');
traceLine.setAttribute('opacity','0.95');
svgEl.appendChild(traceLine);

// Car SVG circle (drawn in SVG, always on top)
const carGlow=document.createElementNS(NS,'circle');
carGlow.setAttribute('r','12');carGlow.setAttribute('fill','rgba(240,165,0,0.2)');carGlow.setAttribute('filter','url(#gd)');
svgEl.appendChild(carGlow);

// ── Car marker (emoji, Leaflet) ──
const carIcon=L.divIcon({
  className:'car-icon',
  html:'<div style="font-size:1.45rem;line-height:1;filter:drop-shadow(0 0 5px rgba(240,165,0,0.95)) drop-shadow(0 0 2px #000)">🚗</div>',
  iconSize:[26,26],iconAnchor:[13,18]
});
const carMarker=L.marker(DENSE[0],{icon:carIcon,zIndexOffset:900}).addTo(map);

// ══════════════════════════════════════════════
//  DOTS — added per stop, stored
// ══════════════════════════════════════════════
const placedDots={}; // stopIdx → {ring, dot, label}

function addDot(stopIdx){
  if(placedDots[stopIdx]) return;
  const s=STOPS[stopIdx];
  const ll=[s[0],s[1]];
  const p=map.latLngToContainerPoint(ll);

  const ring=document.createElementNS(NS,'circle');
  ring.setAttribute('r','11');ring.setAttribute('fill','rgba(240,165,0,0.14)');
  ring.setAttribute('stroke','rgba(240,165,0,0.5)');ring.setAttribute('stroke-width','1');
  ring.setAttribute('filter','url(#gd)');
  // Insert before traces so dots appear under trace line tip
  svgEl.insertBefore(ring, traceGlow);

  const dot=document.createElementNS(NS,'circle');
  const isLast=stopIdx===STOPS.length-1;
  dot.setAttribute('r', isLast?'6':'4.5');
  dot.setAttribute('fill', isLast?'#ff4444':'#f0a500');
  dot.setAttribute('filter','url(#gd)');
  dot.style.transformOrigin='center';
  dot.style.animation='popDot 0.35s ease forwards';
  svgEl.insertBefore(dot, traceLine); // below traceline

  const lbl=L.marker(ll,{
    icon:L.divIcon({className:'dot-lbl',html:`<div>${s[2]}</div>`,iconAnchor:[-8,5]}),
    interactive:false,zIndexOffset:300
  }).addTo(map);

  placedDots[stopIdx]={ring,dot,lbl,ll};
  updateDotPos(stopIdx);
}

function updateDotPos(idx){
  const o=placedDots[idx]; if(!o) return;
  const p=map.latLngToContainerPoint(o.ll);
  o.ring.setAttribute('cx',p.x);o.ring.setAttribute('cy',p.y);
  o.dot.setAttribute('cx',p.x);o.dot.setAttribute('cy',p.y);
}

function removeDot(stopIdx){
  const o=placedDots[stopIdx]; if(!o) return;
  try{svgEl.removeChild(o.ring)}catch(e){}
  try{svgEl.removeChild(o.dot)}catch(e){}
  map.removeLayer(o.lbl);
  delete placedDots[stopIdx];
}

// ══════════════════════════════════════════════
//  TRACE — rebuild from DENSE[0..currentDenseIdx]
// ══════════════════════════════════════════════
let currentDenseIdx=0;

function rebuildTrace(upTo){
  const pts=[];
  for(let i=0;i<=upTo;i++){
    const p=map.latLngToContainerPoint(DENSE[i]);
    pts.push(`${p.x},${p.y}`);
  }
  const s=pts.join(' ');
  traceLine.setAttribute('points',s);
  traceGlow.setAttribute('points',s);
}

// Update car SVG glow position
function updateCarSvg(ll){
  const p=map.latLngToContainerPoint(ll);
  carGlow.setAttribute('cx',p.x);carGlow.setAttribute('cy',p.y);
}

// Full redraw on map move
function onMapMove(){
  rebuildTrace(currentDenseIdx);
  updateCarSvg(DENSE[currentDenseIdx]);
  Object.keys(placedDots).forEach(i=>updateDotPos(+i));
}
map.on('move zoom moveend zoomend', onMapMove);

// ══════════════════════════════════════════════
//  ANIMATION ENGINE
//  Smooth interpolation using requestAnimationFrame
// ══════════════════════════════════════════════
let animReq=null;
let animFrom=0;  // dense idx start
let animTo=0;    // dense idx target
let animT0=null; // timestamp start
// ms per micro-step — constant speed regardless of segment length
// STEPS_PER_KM=0.8, we want ~60km/hr feel → each step = 1/0.8 km → 1.25km
// at "relaxed road trip" pace: 1 real-second = ~20 map-km
// so ms_per_step = 1000/20 * 1.25 = 62.5ms … total ~1360steps → ~85s full trip
// We want ~40s full trip → MS_PER_STEP ≈ 29
const MS_PER_STEP = 29; // tweak this one number to change overall speed

function cancelAnim(){
  if(animReq){cancelAnimationFrame(animReq);animReq=null;}
}

function animateTo(targetDenseIdx, onDone){
  cancelAnim();
  const fromIdx=currentDenseIdx;
  const toIdx=targetDenseIdx;
  if(fromIdx===toIdx){onDone&&onDone();return;}

  const totalSteps=Math.abs(toIdx-fromIdx);
  const dir=toIdx>fromIdx?1:-1;
  // duration purely proportional to steps → constant pixel-speed
  const duration=totalSteps*MS_PER_STEP;

  animT0=null;
  function step(ts){
    if(!animT0) animT0=ts;
    const elapsed=ts-animT0;
    const rawF=Math.min(elapsed/duration,1);
    // ease in-out cubic
    const f=rawF<0.5?4*rawF*rawF*rawF:(rawF-1)*(2*rawF-2)*(2*rawF-2)+1;

    const idx=Math.round(fromIdx+dir*totalSteps*f);
    currentDenseIdx=Math.max(0,Math.min(DENSE.length-1,idx));

    // Move car marker + SVG
    carMarker.setLatLng(DENSE[currentDenseIdx]);
    updateCarSvg(DENSE[currentDenseIdx]);
    rebuildTrace(currentDenseIdx);

    // Camera: pan gently toward car without re-zooming
    if(rawF<0.98 && rawF%0.04<0.02){
      map.panTo(DENSE[currentDenseIdx],{animate:true,duration:0.6,easeLinearity:0.5,noMoveStart:true});
    }

    if(rawF<1){
      animReq=requestAnimationFrame(step);
    } else {
      currentDenseIdx=toIdx;
      carMarker.setLatLng(DENSE[toIdx]);
      updateCarSvg(DENSE[toIdx]);
      rebuildTrace(toIdx);
      animReq=null;
      onDone&&onDone();
    }
  }
  animReq=requestAnimationFrame(step);
}

// ══════════════════════════════════════════════
//  STOP LOGIC
// ══════════════════════════════════════════════
let currentStop=-1;
let autoTimer=null;
let isAnimating=false;

// Build left panel
const panel=document.getElementById('checkin-panel');
STOPS.forEach((s,i)=>{
  const el=document.createElement('div');
  el.className='ci-item';el.id=`ci-${i}`;
  el.innerHTML=`<div class="ci-num">${i+1}</div><div class="ci-name">${s[2]}</div><div class="ci-tick">✓</div>`;
  el.onclick=()=>{stopAuto();goTo(i);};
  panel.appendChild(el);
});

function updateUI(stopIdx){
  const s=STOPS[stopIdx];
  document.querySelectorAll('.ci-item').forEach((el,i)=>{
    el.classList.remove('active','visited');
    if(i<stopIdx) el.classList.add('visited');
    else if(i===stopIdx) el.classList.add('visited','active');
  });
  const activeEl=document.getElementById(`ci-${stopIdx}`);
  if(activeEl) activeEl.scrollIntoView({behavior:'smooth',block:'nearest'});

  const pct=Math.round(stopIdx/(STOPS.length-1)*100);
  document.getElementById('sv-checked').textContent=stopIdx+1;
  document.getElementById('sv-km').textContent=s[3].toLocaleString();
  document.getElementById('sv-pct').textContent=pct+'%';
  document.getElementById('prog-fill').style.width=pct+'%';
  document.getElementById('step-ctr').textContent=`${stopIdx+1} / ${STOPS.length}`;
  const em=stopIdx===STOPS.length-1?'🏁':stopIdx===0?'🚦':'📍';
  document.querySelector('#hdr h1').textContent=`${em} CHECK-IN: ${s[2].toUpperCase()}`;
  document.getElementById('btn-prev').disabled=stopIdx<=0;
  document.getElementById('btn-next').disabled=stopIdx>=STOPS.length-1;
}

function goTo(stopIdx, onDone){
  if(stopIdx<0||stopIdx>=STOPS.length) return;
  if(isAnimating) return; // prevent double-trigger
  isAnimating=true;

  const targetDense=STOP_IDX[stopIdx];

  // If going backward, remove dots ahead
  if(stopIdx<currentStop){
    for(let i=stopIdx+1;i<=currentStop;i++) removeDot(i);
    // trim currentDenseIdx immediately so trace shrinks during anim
  }

  currentStop=stopIdx;
  updateUI(stopIdx);

  // Fly camera to midpoint first if far away, then follow during anim
  const s=STOPS[stopIdx];
  if(currentDenseIdx===0 && stopIdx===0){
    map.flyTo([s[0],s[1]],8,{duration:1.2,easeLinearity:0.4});
    setTimeout(()=>{
      addDot(0);
      isAnimating=false;
      onDone&&onDone();
    },1300);
    return;
  }

  animateTo(targetDense, ()=>{
    addDot(stopIdx);
    isAnimating=false;
    onDone&&onDone();
  });
}

// Auto-play: chain each stop sequentially
function startAuto(){
  stopAuto();
  document.getElementById('autoplay-dot').style.animation='blink 1s ease-in-out infinite';
  document.getElementById('autoplay-dot').style.opacity='1';
  document.getElementById('btn-play').textContent='⏸ PAUSE';

  function next(){
    if(!autoTimer) return; // was stopped
    if(currentStop>=STOPS.length-1){stopAuto();return;}
    goTo(currentStop+1, ()=>{
      if(!autoTimer) return;
      // small pause at each stop before continuing
      autoTimer=setTimeout(next, 600);
    });
  }
  // kick off
  if(currentStop<0){
    goTo(0,()=>{autoTimer=setTimeout(next,600);});
    autoTimer=true; // sentinel
  } else {
    autoTimer=setTimeout(next,200);
  }
}

function stopAuto(){
  if(typeof autoTimer==='number') clearTimeout(autoTimer);
  autoTimer=null;
  cancelAnim();
  isAnimating=false;
  document.getElementById('autoplay-dot').style.animation='none';
  document.getElementById('autoplay-dot').style.opacity='0.2';
  const b=document.getElementById('btn-play');if(b)b.textContent='▶ PLAY';
}

document.getElementById('btn-play').onclick=()=>{
  if(autoTimer) stopAuto(); else startAuto();
};
document.getElementById('btn-next').onclick=()=>{
  stopAuto();
  if(currentStop<STOPS.length-1) goTo(currentStop+1);
};
document.getElementById('btn-prev').onclick=()=>{
  stopAuto();
  if(currentStop>0) goTo(currentStop-1);
};

// Init: show map, place car, go to stop 0
setTimeout(()=>{
  map.flyTo([18.5,106.5],6,{duration:0.1});
  goTo(0);
},400);
</script>
